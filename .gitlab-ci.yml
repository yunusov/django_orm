image: python:3.13

variables:
  SECRET_KEY: "test-secret-key"
  DEBUG: "True"
  ENGINE: "django.db.backends.sqlite3"
  NAME: ":memory:"
  USER: ""
  PASSWORD: ""
  HOST: ""
  PORT: ""
  REDIS_URL: "redis://localhost:6379"

stages:
  - testing
  - build
  - deploy

before_script:
  - python -m pip install --upgrade pip
  - pip install uv
  - uv sync

lint:
  stage: testing
  script:
    - uv run ruff check config/ store_app/

test:
  stage: testing
  services:
    - postgres
  variables:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: password
    POSTGRES_DB: postgres
    DB_HOST: localhost
  script:
    - uv run bash start_test.sh

build-job:      
  stage: build
  script:
    - echo "Building..."
    - echo "Done"

deploy-job:
  stage: deploy
  script:
    - echo "Deploying app"
    - echo "Done"
