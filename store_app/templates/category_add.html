{% extends 'base.html' %}

{% block title %}{{ name }}{% endblock %}

{% block content %}
    <h1>{{ name }}</h1>
    <form method="post" class="mt-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Добавить категорию</button>
    </form>
    <a href="{% url 'index' %}" class="btn btn-secondary mt-3">Назад к списку продуктов</a>
{% endblock %}
